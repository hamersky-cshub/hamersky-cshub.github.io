# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # It starts the workflow on push to the main branch
  push:
    branches:
      - main # Or 'master', depending on your main branch
  # Allows manual triggering of the workflow from the Actions tab on GitHub
  workflow_dispatch:

# Setting up GITHUB_TOKEN permissions for deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, canceling pending/deployments
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6.0.0
        
      - name: Generate material zips
        run: |
          chmod +x scripts/generate-zips.sh
          bash scripts/generate-zips.sh

      - name: Build with Astro
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
